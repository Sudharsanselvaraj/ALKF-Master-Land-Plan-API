<svg width="680" height="1230" viewBox="0 0 680 1230" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:'Segoe UI',system-ui,sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .t  { font-size:14px; fill:#1a1a1a; font-weight:400; }
      .th { font-size:14px; fill:#1a1a1a; font-weight:500; }
      .ts { font-size:12px; fill:#555555; font-weight:400; }
      .c-gray rect, .c-gray circle { fill:#F1EFE8; stroke:#5F5E5A; }
      .c-gray .th, .c-gray .t { fill:#2C2C2A; }
      .c-gray .ts { fill:#5F5E5A; }
      .c-teal rect, .c-teal circle { fill:#E1F5EE; stroke:#0F6E56; }
      .c-teal .th, .c-teal .t { fill:#085041; }
      .c-teal .ts { fill:#0F6E56; }
      .c-purple rect, .c-purple circle { fill:#EEEDFE; stroke:#534AB7; }
      .c-purple .th, .c-purple .t { fill:#26215C; }
      .c-purple .ts { fill:#534AB7; }
      .c-coral rect, .c-coral circle { fill:#FAECE7; stroke:#993C1D; }
      .c-coral .th, .c-coral .t { fill:#4A1B0C; }
      .c-coral .ts { fill:#993C1D; }
      .c-blue rect, .c-blue circle { fill:#E6F1FB; stroke:#185FA5; }
      .c-blue .th, .c-blue .t { fill:#042C53; }
      .c-blue .ts { fill:#185FA5; }
      .c-green rect, .c-green circle { fill:#EAF3DE; stroke:#3B6D11; }
      .c-green .th, .c-green .t { fill:#173404; }
      .c-green .ts { fill:#3B6D11; }
      .c-amber rect, .c-amber circle { fill:#FAEEDA; stroke:#854F0B; }
      .c-amber .th, .c-amber .t { fill:#412402; }
      .c-amber .ts { fill:#854F0B; }
      .arr { stroke:#888888; stroke-width:1px; fill:none; marker-end:url(#arrow); }
    </style>
  </defs>

  <!-- Title -->
  <text class="th" x="340" y="30" text-anchor="middle" font-size="15" fill="#1a1a1a">ALKF Master Land Plan API — architecture</text>

  <!-- Flask badge -->
  <rect x="270" y="40" width="100" height="20" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="320" y="54" text-anchor="middle" font-size="10" font-weight="600" fill="#854F0B">Flask · Gunicorn</text>

  <!-- CLIENT -->
  <g class="c-gray">
    <rect x="240" y="72" width="200" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="99" text-anchor="middle" dominant-baseline="central">Client (HTTP)</text>
  </g>

  <!-- arrows client -> endpoints -->
  <line x1="290" y1="116" x2="250" y2="168" class="arr"/>
  <line x1="340" y1="116" x2="340" y2="168" class="arr"/>
  <line x1="390" y1="116" x2="430" y2="168" class="arr"/>

  <!-- ENDPOINTS ROW -->
  <g class="c-teal">
    <rect x="50" y="168" width="175" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="138" y="190" text-anchor="middle" dominant-baseline="central">GET /</text>
    <text class="ts" x="138" y="208" text-anchor="middle" dominant-baseline="central">health check</text>
  </g>
  <g class="c-purple">
    <rect x="253" y="168" width="175" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="190" text-anchor="middle" dominant-baseline="central">POST /site-intelligence</text>
    <text class="ts" x="340" y="208" text-anchor="middle" dominant-baseline="central">→ jsonify() response</text>
  </g>
  <g class="c-coral">
    <rect x="456" y="168" width="175" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="543" y="190" text-anchor="middle" dominant-baseline="central">POST /site-intel-dxf</text>
    <text class="ts" x="543" y="208" text-anchor="middle" dominant-baseline="central">→ Response(.dxf)</text>
  </g>

  <!-- Request parsing note -->
  <rect x="253" y="236" width="175" height="30" rx="6" fill="none" stroke="#cccccc" stroke-dasharray="4 3" stroke-width="1"/>
  <text class="ts" x="340" y="255" text-anchor="middle" fill="#666666">_parse_body() + MD5 cache</text>

  <!-- arrows -> pipeline -->
  <line x1="340" y1="266" x2="340" y2="298" class="arr"/>
  <line x1="543" y1="224" x2="543" y2="278" stroke="#888" stroke-width="1" fill="none"/>
  <line x1="543" y1="278" x2="556" y2="298" class="arr"/>

  <!-- PIPELINE HEADER -->
  <g class="c-blue">
    <rect x="30" y="298" width="560" height="36" rx="10" stroke-width="0.5"/>
    <text class="th" x="310" y="316" text-anchor="middle" dominant-baseline="central">generate_site_intelligence()  —  spatial_intelligence.py</text>
  </g>

  <!-- Steps 1-3 -->
  <g class="c-purple">
    <rect x="42" y="350" width="180" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="132" y="370" text-anchor="middle" dominant-baseline="central">Step 1 — Resolve</text>
    <text class="ts" x="132" y="388" text-anchor="middle" dominant-baseline="central">resolver.py → WGS84</text>
  </g>
  <g class="c-purple">
    <rect x="236" y="350" width="180" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="326" y="370" text-anchor="middle" dominant-baseline="central">Step 2 — Boundary</text>
    <text class="ts" x="326" y="388" text-anchor="middle" dominant-baseline="central">iC1000 API → EPSG:3857</text>
  </g>
  <g class="c-purple">
    <rect x="430" y="350" width="160" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="510" y="370" text-anchor="middle" dominant-baseline="central">Step 3 — Densify</text>
    <text class="ts" x="510" y="388" text-anchor="middle" dominant-baseline="central">1m interpolation</text>
  </g>
  <line x1="222" y1="378" x2="235" y2="378" class="arr"/>
  <line x1="416" y1="378" x2="429" y2="378" class="arr"/>

  <!-- Steps 4-5 -->
  <g class="c-teal">
    <rect x="42" y="424" width="260" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="172" y="444" text-anchor="middle" dominant-baseline="central">Step 4 — OSM Features</text>
    <text class="ts" x="172" y="462" text-anchor="middle" dominant-baseline="central">buildings / parks / water (concurrent)</text>
  </g>
  <g class="c-green">
    <rect x="318" y="424" width="272" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="454" y="444" text-anchor="middle" dominant-baseline="central">Step 5 — View classify</text>
    <text class="ts" x="454" y="462" text-anchor="middle" dominant-baseline="central">view.py sectors → SEA/GREEN/CITY…</text>
  </g>
  <line x1="510" y1="406" x2="510" y2="423" stroke="#888" stroke-width="1" fill="none"/>
  <line x1="510" y1="423" x2="326" y2="423" stroke="#888" stroke-width="1" fill="none"/>
  <line x1="326" y1="423" x2="326" y2="424" class="arr"/>
  <line x1="302" y1="452" x2="317" y2="452" class="arr"/>

  <!-- Step 6 — Noise -->
  <g class="c-coral">
    <rect x="42" y="498" width="548" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="316" y="518" text-anchor="middle" dominant-baseline="central">Step 6 — Noise pipeline</text>
    <text class="ts" x="316" y="536" text-anchor="middle" dominant-baseline="central">noise.py: WFS → emit engine → 5m grid → NN sample  |  fallback: road-class attenuation</text>
  </g>
  <line x1="316" y1="480" x2="316" y2="497" class="arr"/>
  <line x1="316" y1="554" x2="316" y2="571" class="arr"/>

  <!-- Step 7 — Threshold -->
  <g class="c-amber">
    <rect x="120" y="571" width="392" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="316" y="593" text-anchor="middle" dominant-baseline="central">Step 7 — Threshold + assemble JSON output</text>
  </g>

  <!-- Optional lease plan -->
  <line x1="316" y1="615" x2="316" y2="636" stroke="#aaa" stroke-width="1" fill="none"/>
  <rect x="100" y="636" width="432" height="36" rx="8" fill="none" stroke="#cccccc" stroke-dasharray="4 3" stroke-width="1"/>
  <text class="ts" x="316" y="658" text-anchor="middle" fill="#666666">Optional: lease_plan_parser.py → OpenCV HSV segmentation → EPSG:3857 zones</text>

  <!-- Output branch -->
  <line x1="316" y1="672" x2="316" y2="696" class="arr"/>
  <line x1="316" y1="696" x2="180" y2="696" stroke="#888" stroke-width="1" fill="none"/>
  <line x1="316" y1="696" x2="500" y2="696" stroke="#888" stroke-width="1" fill="none"/>
  <line x1="180" y1="696" x2="180" y2="712" class="arr"/>
  <line x1="500" y1="696" x2="500" y2="712" class="arr"/>
  <g class="c-purple">
    <rect x="60" y="712" width="240" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="180" y="734" text-anchor="middle" dominant-baseline="central">jsonify(result)</text>
  </g>
  <g class="c-coral">
    <rect x="380" y="712" width="240" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="500" y="734" text-anchor="middle" dominant-baseline="central">dxf_export.py → Response(.dxf)</text>
  </g>

  <!-- Section: External data sources -->
  <text class="th" x="340" y="796" text-anchor="middle" font-size="13" fill="#1a1a1a">External data sources &amp; dependencies</text>

  <g class="c-blue">
    <rect x="30" y="814" width="190" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="125" y="834" text-anchor="middle" dominant-baseline="central">HK GeoData API</text>
    <text class="ts" x="125" y="852" text-anchor="middle" dominant-baseline="central">location resolution</text>
  </g>
  <g class="c-blue">
    <rect x="238" y="814" width="190" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="333" y="834" text-anchor="middle" dominant-baseline="central">LandsD iC1000 API</text>
    <text class="ts" x="333" y="852" text-anchor="middle" dominant-baseline="central">lot boundary GML</text>
  </g>
  <g class="c-blue">
    <rect x="446" y="814" width="205" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="548" y="834" text-anchor="middle" dominant-baseline="central">CSDI WFS (HK EPD)</text>
    <text class="ts" x="548" y="852" text-anchor="middle" dominant-baseline="central">ATC traffic + LNRS data</text>
  </g>

  <g class="c-green">
    <rect x="30" y="884" width="190" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="125" y="904" text-anchor="middle" dominant-baseline="central">OpenStreetMap</text>
    <text class="ts" x="125" y="922" text-anchor="middle" dominant-baseline="central">buildings / parks / water / roads</text>
  </g>
  <g class="c-green">
    <rect x="238" y="884" width="190" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="333" y="904" text-anchor="middle" dominant-baseline="central">BUILDINGS_FINAL.gpkg</text>
    <text class="ts" x="333" y="922" text-anchor="middle" dominant-baseline="central">42k HK building heights</text>
  </g>
  <g class="c-amber">
    <rect x="446" y="884" width="205" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="548" y="904" text-anchor="middle" dominant-baseline="central">Lease plan (PDF/PNG)</text>
    <text class="ts" x="548" y="922" text-anchor="middle" dominant-baseline="central">base64 — optional input</text>
  </g>

  <!-- Section: DXF output layers -->
  <text class="th" x="340" y="974" text-anchor="middle" font-size="13" fill="#1a1a1a">DXF output layers</text>

  <g class="c-gray">
    <rect x="30" y="990" width="116" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="88" y="1012" text-anchor="middle" dominant-baseline="central">SITE_BOUNDARY</text>
  </g>
  <g class="c-green">
    <rect x="158" y="990" width="116" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="216" y="1012" text-anchor="middle" dominant-baseline="central">VIEW_POINTS</text>
  </g>
  <g class="c-coral">
    <rect x="286" y="990" width="116" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="344" y="1012" text-anchor="middle" dominant-baseline="central">NOISE_POINTS</text>
  </g>
  <g class="c-blue">
    <rect x="414" y="990" width="116" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="472" y="1012" text-anchor="middle" dominant-baseline="central">NON_BUILDING</text>
  </g>
  <g class="c-amber">
    <rect x="542" y="990" width="100" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="592" y="1012" text-anchor="middle" dominant-baseline="central">LABELS</text>
  </g>

  <!-- Section: View classification labels -->
  <text class="th" x="340" y="1060" text-anchor="middle" font-size="13" fill="#1a1a1a">View classification labels</text>

  <g class="c-blue">
    <rect x="30" y="1074" width="88" height="36" rx="6" stroke-width="0.5"/>
    <text class="ts" x="74" y="1092" text-anchor="middle" dominant-baseline="central">SEA</text>
  </g>
  <g class="c-blue">
    <rect x="126" y="1074" width="88" height="36" rx="6" stroke-width="0.5"/>
    <text class="ts" x="170" y="1092" text-anchor="middle" dominant-baseline="central">HARBOR</text>
  </g>
  <g class="c-blue">
    <rect x="222" y="1074" width="88" height="36" rx="6" stroke-width="0.5"/>
    <text class="ts" x="266" y="1092" text-anchor="middle" dominant-baseline="central">RESERVOIR</text>
  </g>
  <g class="c-green">
    <rect x="318" y="1074" width="88" height="36" rx="6" stroke-width="0.5"/>
    <text class="ts" x="362" y="1092" text-anchor="middle" dominant-baseline="central">GREEN</text>
  </g>
  <g class="c-green">
    <rect x="414" y="1074" width="88" height="36" rx="6" stroke-width="0.5"/>
    <text class="ts" x="458" y="1092" text-anchor="middle" dominant-baseline="central">PARK</text>
  </g>
  <g class="c-coral">
    <rect x="510" y="1074" width="88" height="36" rx="6" stroke-width="0.5"/>
    <text class="ts" x="554" y="1092" text-anchor="middle" dominant-baseline="central">CITY</text>
  </g>
  <g class="c-gray">
    <rect x="606" y="1074" width="56" height="36" rx="6" stroke-width="0.5"/>
    <text class="ts" x="634" y="1092" text-anchor="middle" dominant-baseline="central">MNTN</text>
  </g>

  <!-- Footer -->
  <text class="ts" x="340" y="1160" text-anchor="middle" fill="#888888">Python 3.11 · Flask · Gunicorn (gthread) · Render Singapore · ezdxf R2010 · OpenCV · osmnx · Shapely · PyProj</text>
</svg>
